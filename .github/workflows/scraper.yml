name: LinkedIn Job Scraper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: linkedin-job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore seen jobs DB
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            seen-jobs-${{ github.ref_name }}-

      - name: Run scraper
        run: python main.py

      - name: Save seen jobs DB
        if: always() && hashFiles('seen_jobs.db') != ''
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-${{ github.ref_name }}-${{ github.run_id }}